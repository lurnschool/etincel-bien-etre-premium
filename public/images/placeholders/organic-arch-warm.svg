<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8eedc"/>
      <stop offset="100%" stop-color="#e8d3ac"/>
    </linearGradient>
    <radialGradient id="arch" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#caa093" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#caa093" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#caa093" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="5"/>
      <feColorMatrix values="0 0 0 0 0.55 0 0 0 0 0.45 0 0 0 0 0.35 0 0 0 0.05 0"/>
    </filter>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <path d="M 0 1000 Q 400 250 800 1000 Z" fill="url(#arch)" filter="url(#blur)"/>
  <rect width="800" height="1000" filter="url(#noise)"/>
</svg>
