<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-hidden="true">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#e6c79a"/>
      <stop offset="60%" stop-color="#caa376"/>
      <stop offset="100%" stop-color="#9c7c52"/>
    </radialGradient>
    <linearGradient id="band" x1="0" y1="0.45" x2="0" y2="0.55">
      <stop offset="0%" stop-color="#7a5d3a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7a5d3a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7a5d3a" stop-opacity="0"/>
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="171"/>
      <feColorMatrix values="0 0 0 0 0.55 0 0 0 0 0.42 0 0 0 0 0.28 0 0 0 0.07 0"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" seed="172"/>
      <feColorMatrix values="0 0 0 0 0.50 0 0 0 0 0.38 0 0 0 0 0.25 0 0 0 0.05 0"/>
    </filter>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <rect width="800" height="1000" filter="url(#grain)"/>
  <!-- Ruban doré horizontal en milieu (style enveloppe ouverte) -->
  <rect x="0" y="450" width="800" height="100" fill="url(#band)"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#b8915c" stroke-opacity="0.5" stroke-width="0.5" stroke-dasharray="4 6"/>
  <rect width="800" height="1000" filter="url(#noise)"/>
</svg>
