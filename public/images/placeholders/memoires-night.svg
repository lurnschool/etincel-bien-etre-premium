<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-hidden="true">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="90%">
      <stop offset="0%" stop-color="#3d3253"/>
      <stop offset="55%" stop-color="#2d2540"/>
      <stop offset="100%" stop-color="#1a1428"/>
    </radialGradient>
    <radialGradient id="moon" cx="68%" cy="22%" r="20%">
      <stop offset="0%" stop-color="#ead7af" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#d2b078" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d2b078" stop-opacity="0"/>
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="33"/>
      <feColorMatrix values="0 0 0 0 0.85 0 0 0 0 0.78 0 0 0 0 0.65 0 0 0 0.05 0"/>
    </filter>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <ellipse cx="544" cy="220" rx="140" ry="140" fill="url(#moon)"/>
  <!-- Petits points étoilés discrets -->
  <circle cx="180" cy="180" r="0.8" fill="#ead7af" opacity="0.55"/>
  <circle cx="280" cy="320" r="0.6" fill="#ead7af" opacity="0.4"/>
  <circle cx="650" cy="450" r="0.9" fill="#ead7af" opacity="0.5"/>
  <circle cx="120" cy="560" r="0.6" fill="#ead7af" opacity="0.45"/>
  <circle cx="380" cy="700" r="0.8" fill="#ead7af" opacity="0.5"/>
  <circle cx="600" cy="800" r="0.6" fill="#ead7af" opacity="0.4"/>
  <circle cx="450" cy="180" r="0.5" fill="#ead7af" opacity="0.3"/>
  <rect width="800" height="1000" filter="url(#noise)"/>
</svg>
