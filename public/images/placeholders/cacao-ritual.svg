<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-hidden="true">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="90%">
      <stop offset="0%" stop-color="#7a5037"/>
      <stop offset="55%" stop-color="#4e3220"/>
      <stop offset="100%" stop-color="#2c1c12"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="60%" r="35%">
      <stop offset="0%" stop-color="#ffd9a3" stop-opacity="0.40"/>
      <stop offset="60%" stop-color="#d2b078" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d2b078" stop-opacity="0"/>
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.88" numOctaves="2" seed="91"/>
      <feColorMatrix values="0 0 0 0 0.42 0 0 0 0 0.28 0 0 0 0 0.18 0 0 0 0.06 0"/>
    </filter>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <rect width="800" height="1000" fill="url(#glow)"/>
  <!-- Tasse stylisée centrée, vue de dessus -->
  <ellipse cx="400" cy="600" rx="120" ry="38" fill="#1a0e08" fill-opacity="0.55"/>
  <ellipse cx="400" cy="595" rx="110" ry="32" fill="#5a3622" fill-opacity="0.7"/>
  <ellipse cx="400" cy="592" rx="100" ry="28" fill="#3a2014" fill-opacity="0.85"/>
  <!-- Vapeur fine au-dessus -->
  <path d="M 360 540 Q 370 480 380 510" stroke="#ffd9a3" stroke-opacity="0.3" stroke-width="1" fill="none"/>
  <path d="M 400 540 Q 410 470 420 500" stroke="#ffd9a3" stroke-opacity="0.3" stroke-width="1" fill="none"/>
  <path d="M 440 540 Q 450 480 460 520" stroke="#ffd9a3" stroke-opacity="0.3" stroke-width="1" fill="none"/>
  <rect width="800" height="1000" filter="url(#noise)"/>
</svg>
