<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf7eb"/>
      <stop offset="50%" stop-color="#f2e6cf"/>
      <stop offset="100%" stop-color="#dec6a0"/>
    </linearGradient>
    <radialGradient id="ray" cx="22%" cy="18%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="35%" stop-color="#ffeed1" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffeed1" stop-opacity="0"/>
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="9"/>
      <feColorMatrix values="0 0 0 0 0.55 0 0 0 0 0.45 0 0 0 0 0.30 0 0 0 0.04 0"/>
    </filter>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <rect width="800" height="1000" fill="url(#ray)"/>
  <rect width="800" height="1000" filter="url(#noise)"/>
</svg>
